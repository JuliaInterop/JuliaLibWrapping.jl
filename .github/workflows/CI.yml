name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: ${{ matrix.package }} - Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # The two packages live in sibling subdirectories of this monorepo.
        # `setup-julia`'s `project` input resolves `min` from each package's
        # own [compat], so they can carry different lower bounds.
        package:
          - JuliaLibWrapping
          - JLWInterop
        version:
          - 'min'
          - 'pre'
          - 'nightly'
        os:
          - ubuntu-latest
        arch:
          - x64
        include:
          - package: JuliaLibWrapping
            coverage_dirs: JuliaLibWrapping/src,JuliaLibWrapping/ext
          - package: JLWInterop
            coverage_dirs: JLWInterop/src
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
          project: ${{ matrix.package }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: ${{ matrix.package }}
      - uses: julia-actions/julia-runtest@v1
        with:
          project: ${{ matrix.package }}
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: ${{ matrix.coverage_dirs }}
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          flags: ${{ matrix.package }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      actions: write # needed to allow julia-actions/cache to proactively delete old caches that it has created
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: 'pre'
          project: JuliaLibWrapping/docs
      - uses: julia-actions/cache@v3
      - name: Build and deploy documentation
        # The docs environment pulls JuliaLibWrapping and JLWInterop in via its
        # own [sources], so a plain instantiate is enough — no separate
        # Pkg.develop step. make.jl is run directly as a script (not via
        # `include` under a `julia {0}` shell, where a relative include path
        # resolves against the temp script's directory rather than the repo
        # root); makedocs derives its root from make.jl's own location.
        # julia-docdeploy is avoided because it hard-codes a top-level `docs/`.
        run: |
          julia --project=JuliaLibWrapping/docs -e 'using Pkg; Pkg.instantiate()'
          julia --project=JuliaLibWrapping/docs --color=yes JuliaLibWrapping/docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
